<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
  "http://www.w3.org/TR/html4/loose.dtd">
<html lang="en">
<head>
  <title>Files | Chronograph</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      display: -webkit-box; -webkit-box-orient: vertical;
      display: -webkit-flex; -webkit-flex-direction: column;
      display: flex; flex-direction: column;
      background: #f2f2f2;
    }
    #files-header {
      -webkit-flex-shrink: 0; flex-shrink: 0;
      background: -webkit-linear-gradient(top, #2a2a2a 0%, #1a1a1a 100%);
      background: linear-gradient(to bottom, #2a2a2a 0%, #1a1a1a 100%);
      border-bottom: 1px solid #000;
      text-align: center;
      padding: 8px 0;
    }
    #files-header img {
      height: 28px; display: inline-block; vertical-align: middle;
    }
    #files-frame {
      -webkit-box-flex: 1; -webkit-flex: 1 1 auto; flex: 1 1 auto;
      width: 100%; border: none; display: block;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div id="files-header">
    <img src="../assets/Colorful2010Logo.png" alt="ChronArchive">
  </div>
  <iframe id="files-frame" src="https://beta.chronarchive.com/Chronarchive/?b=1/" scrolling="yes" frameborder="0"></iframe>
</body>
</html>
