<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
  "http://www.w3.org/TR/html4/loose.dtd">
<html lang="en">
<head>
  <title>Search | Chronograph</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; background-color: #c8c8c8; background-image: none;
      display: -webkit-box; -webkit-box-orient: vertical; -webkit-box-pack: center; -webkit-box-align: center;
      display: -webkit-flex; -webkit-flex-direction: column; -webkit-justify-content: center; -webkit-align-items: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    #search-wrap { text-align: center; width: 100%; padding: 0 20px; }
    #search-logo { width: 90%; max-width: 100%; margin-bottom: 28px; display: block; margin-left: auto; margin-right: auto; }
    #search-area { width: 100%; }
    #search-area form {
      display: -webkit-flex; display: flex;
      -webkit-align-items: stretch; align-items: stretch;
      width: 100%;
    }
    #search-input { -webkit-flex: 1; flex: 1; min-width: 0; height: 48px; font-size: 16px; padding: 0 12px; -webkit-border-radius: 15px 0 0 15px; border-radius: 15px 0 0 15px; }
    #search-btn {
      height: 48px; font-size: 16px; padding: 0 18px;
      -webkit-flex-shrink: 0; flex-shrink: 0; white-space: nowrap;
      background-image: -webkit-linear-gradient(top,
        rgba(255,255,255,0.72) 0%, rgba(255,255,255,0.08) 50%,
        rgba(0,0,0,0.06) 51%, rgba(0,0,0,0) 100%),
        -webkit-linear-gradient(top, #3fa8e8 0%, #0070cc 48%, #004fa0 100%);
      background-image: linear-gradient(to bottom,
        rgba(255,255,255,0.72) 0%, rgba(255,255,255,0.08) 50%,
        rgba(0,0,0,0.06) 51%, rgba(0,0,0,0) 100%),
        linear-gradient(to bottom, #3fa8e8 0%, #0070cc 48%, #004fa0 100%);
      border: 1px solid #003e8a;
      -webkit-border-radius: 0 15px 15px 0;
      border-radius: 0 15px 15px 0;
      -webkit-box-shadow: 0 1px 3px rgba(0,0,100,0.30);
      box-shadow: 0 1px 3px rgba(0,0,100,0.30);
      color: #ffffff; font-weight: bold; cursor: pointer; vertical-align: middle;
    }
    /* Profile pill overlay */
    #search-prof-pill {
      position: fixed; top: 10px; right: 10px; z-index: 50;
      height: 30px; padding: 0 10px 0 4px;
      -webkit-border-radius: 15px; border-radius: 15px;
      background: -webkit-linear-gradient(top, #1a7ce8 0%, #0055cc 100%);
      background: linear-gradient(to bottom, #1a7ce8 0%, #0055cc 100%);
      border: 1px solid #003ca0;
      -webkit-box-shadow: 0 1px 2px rgba(0,0,80,0.25); box-shadow: 0 1px 2px rgba(0,0,80,0.25);
      color: #fff; cursor: pointer; -webkit-tap-highlight-color: transparent;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      text-decoration: none;
    }
    #spp-av {
      width: 22px; height: 22px; -webkit-border-radius: 11px; border-radius: 11px;
      background: rgba(255,255,255,0.25); overflow: hidden; margin-right: 5px;
      text-align: center; line-height: 22px; font-size: 11px; font-weight: bold;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }
    #spp-av img { width: 22px; height: 22px; display: block; -webkit-border-radius: 11px; border-radius: 11px; }
    #spp-lbl { font-size: 12px; font-weight: bold; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <!-- Profile pill -->
  <a id="search-prof-pill" href="home.html" title="Profile">
    <span id="spp-av">&#9786;</span>
    <span id="spp-lbl">Profile</span>
  </a>

  <div id="search-wrap">
    <img id="search-logo" src="../assets/CAlog10.png" alt="ChronArchive">

    <div id="search-area">
      <form action="https://m.bing.com/search" method="GET">
        <input type="text" name="q" id="search-input" placeholder="Search the web&hellip;">
        <input type="submit" value="Search" id="search-btn">
      </form>
    </div>
  </div>
  <script type="text/javascript">
  (function(){
    var store={
      g:function(k){try{return localStorage.getItem(k);}catch(e){return null;}}
    };
    var uname=store.g('hm_n')||store.g('cg_n');
    var av=store.g('hm_av')||store.g('cg_av')||'';
    if(uname){
      var avEl=document.getElementById('spp-av');
      var lbEl=document.getElementById('spp-lbl');
      if(av){avEl.innerHTML='<img src="'+av+'" alt="">';}
      else{avEl.textContent=(uname||'?').charAt(0).toUpperCase();}
      lbEl.textContent=uname;
    }
  })();
  </script>
</body>
</html>
