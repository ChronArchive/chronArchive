<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
  "http://www.w3.org/TR/html4/loose.dtd">
<html lang="en">
<head>
  <title>Search | Chronograph</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; background-color: #c8c8c8; background-image: none;
      display: -webkit-box; -webkit-box-orient: vertical; -webkit-box-pack: center; -webkit-box-align: center;
      display: -webkit-flex; -webkit-flex-direction: column; -webkit-justify-content: center; -webkit-align-items: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    #search-wrap { text-align: center; width: 100%; padding: 0 20px; }
    #search-logo { width: 90%; max-width: 100%; margin-bottom: 28px; display: block; margin-left: auto; margin-right: auto; }
    #search-area { width: 100%; }
    #search-area form {
      display: -webkit-flex; display: flex;
      -webkit-align-items: stretch; align-items: stretch;
      width: 100%;
    }
    #search-input { -webkit-flex: 1; flex: 1; min-width: 0; height: 48px; font-size: 16px; padding: 0 12px; -webkit-border-radius: 15px 0 0 15px; border-radius: 15px 0 0 15px; }
    #search-btn {
      height: 48px; font-size: 16px; padding: 0 18px;
      background-image: -webkit-linear-gradient(top,
        rgba(255,255,255,0.72) 0%, rgba(255,255,255,0.08) 50%,
        rgba(0,0,0,0.06) 51%, rgba(0,0,0,0) 100%),
        -webkit-linear-gradient(top, #3fa8e8 0%, #0070cc 48%, #004fa0 100%);
      background-image: linear-gradient(to bottom,
        rgba(255,255,255,0.72) 0%, rgba(255,255,255,0.08) 50%,
        rgba(0,0,0,0.06) 51%, rgba(0,0,0,0) 100%),
        linear-gradient(to bottom, #3fa8e8 0%, #0070cc 48%, #004fa0 100%);
      border: 1px solid #003e8a;
      -webkit-border-radius: 0 15px 15px 0;
      border-radius: 0 15px 15px 0;
      -webkit-box-shadow: 0 1px 3px rgba(0,0,100,0.30);
      box-shadow: 0 1px 3px rgba(0,0,100,0.30);
      color: #ffffff; font-weight: bold; cursor: pointer; vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="search-wrap">
    <img id="search-logo" src="../assets/CAlog10.png" alt="ChronArchive">

    <div id="search-area">
      <form action="https://m.bing.com/search" method="GET">
        <input type="text" name="q" id="search-input" placeholder="Search the web&hellip;">
        <input type="submit" value="Search" id="search-btn">
      </form>
    </div>
  </div>
</body>
</html>
