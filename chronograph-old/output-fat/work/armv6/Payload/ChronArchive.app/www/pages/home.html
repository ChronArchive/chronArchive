<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
  "http://www.w3.org/TR/html4/loose.dtd">
<html lang="en">
<head>
  <title>Home | ChronoGraph</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #f2f2f2;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-text-size-adjust: none;
    }

    /* ── Shell: normal block fill, no fixed positioning (broken inside iframes on iOS 7) ── */
    #home-shell {
      width: 100%; height: 100%;
      display: -webkit-box; -webkit-box-orient: vertical;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #home-header {
      height: 44px;
      background: -webkit-linear-gradient(top, #f8f8f8 0%, #ebebeb 100%);
      background: linear-gradient(to bottom, #f8f8f8 0%, #ebebeb 100%);
      border-bottom: 1px solid #c8c8c8;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: space-between; justify-content: space-between;
      padding: 0 12px;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }
    #home-logo-img { height: 26px; display: block; }

    /* ── Toggle ── */
    #feed-toggle {
      display: -webkit-flex; display: flex;
      background: #e0e0e0; border-radius: 16px;
      border: 1px solid #c8c8c8;
    }
    .toggle-btn {
      padding: 5px 16px; font-size: 12px; font-weight: bold;
      color: #555; background: transparent; border: none; cursor: pointer;
      border-radius: 14px; -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.active { background: #5ac8fa; color: #000; }

    /* ── Content area ── */
    #feed-area {
      -webkit-box-flex: 1; -webkit-flex: 1 1 auto; flex: 1 1 auto;
      overflow: hidden; position: relative; min-height: 0;
    }

    /* ══════════════════════════════════
       POSTS FEED  (old Instagram style)
       ══════════════════════════════════ */
    #posts-feed {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: scroll; -webkit-overflow-scrolling: touch;
      background: #f2f2f2;
    }
    .post-card { background: #fff; border-bottom: 6px solid #e8e8e8; }

    .post-header {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      padding: 10px 12px;
    }
    .post-avatar {
      width: 36px; height: 36px; border-radius: 18px;
      background: #222; margin-right: 10px; overflow: hidden;
      -webkit-flex-shrink: 0; flex-shrink: 0;
      border: 1px solid #333;
    }
    .post-avatar img { width: 100%; height: 100%; }
    .post-username { color: #1a1a1a; font-size: 13px; font-weight: bold; }
    .post-location { color: #888; font-size: 11px; margin-top: 1px; }

    .post-img-wrap { width: 100%; line-height: 0; text-align: center; }
    .post-img-wrap img { max-width: 90%; max-height: 90vw; width: auto; height: auto; display: inline-block; }

    .post-actions {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      padding: 10px 10px 6px;
    }
    .action-btn {
      background: none; border: none; cursor: pointer; padding: 4px 8px;
      -webkit-tap-highlight-color: transparent;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
    }
    .action-btn svg { width: 24px; height: 24px; display: block; stroke: #1a1a1a; }
    .action-btn svg[fill="#ff3b30"] { stroke: #ff3b30; }
    .like-wrap {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
    }
    .like-count { color: #666; font-size: 12px; margin-left: 4px; }

    .post-caption { padding: 2px 12px 12px; }
    .post-title { color: #1a1a1a; font-size: 13px; font-weight: bold; }
    .post-desc { color: #555; font-size: 12px; margin-top: 4px; line-height: 1.5; }
    .post-date { color: #999; font-size: 10px; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ══════════════════════════════════
       VIDEOS FEED  (Vine / TikTok style)
       ══════════════════════════════════ */
    #videos-feed {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden; background: #000;
      display: none;
    }
    .video-slide {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #000;
      cursor: pointer;
    }
    .video-slide video {
      position: absolute; top: 50%; left: 50%;
      -webkit-transform: translate(-50%, -50%); transform: translate(-50%, -50%);
      max-width: 100%; max-height: 100%;
    }
    .video-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 60px 16px 14px;
      background: -webkit-linear-gradient(top, transparent 0%, rgba(0,0,0,0.75) 100%);
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.75) 100%);
    }
    .video-title { color: #fff; font-size: 14px; font-weight: bold; }
    .video-desc  { color: #ddd; font-size: 12px; margin-top: 3px; }
    .video-date  { color: #999; font-size: 10px; margin-top: 4px; text-transform: uppercase; }

    .video-side {
      position: absolute; right: 10px; bottom: 60px;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      -webkit-align-items: center; align-items: center;
      gap: 18px;
    }
    .video-action { text-align: center; }
    .vaction-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      -webkit-tap-highlight-color: transparent; display: block; margin: 0 auto;
    }
    .vaction-btn svg { width: 28px; height: 28px; display: block; }
    .vaction-count { color: #fff; font-size: 11px; margin-top: 3px; }

    #vid-nav {
      position: absolute; left: 10px; top: 50%;
      -webkit-transform: translateY(-50%); transform: translateY(-50%);
      z-index: 6;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      -webkit-align-items: center; align-items: center;
    }
    .vnav-btn {
      width: 44px; height: 44px;
      background: none;
      border: none;
      -webkit-border-radius: 0; border-radius: 0;
      color: #fff; font-size: 26px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      cursor: pointer; margin-bottom: 14px;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .vnav-btn:last-child { margin-bottom: 0; }
    .vnav-btn:disabled, .vnav-btn[disabled] { opacity: 0.25; }

  </style>
</head>
<body>
<div id="home-shell">

  <div id="home-header">
    <img id="home-logo-img" src="../assets/ChronoGraphLogo.png" alt="ChronoGraph">
    <div id="feed-toggle">
      <button class="toggle-btn active" id="btn-posts"  onclick="switchFeed('posts')">Posts</button>
      <button class="toggle-btn"        id="btn-videos" onclick="switchFeed('videos')">Videos</button>
    </div>
  </div>

  <div id="feed-area">

    <!-- ════ POSTS ════ -->
    <div id="posts-feed">
      <div id="posts-status" style="text-align:center;padding:40px 20px;color:#888;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;">Loading posts&hellip;</div>
    </div><!-- /posts-feed -->

    <!-- ════ VIDEOS ════ -->
    <div id="videos-feed"></div>

  </div><!-- /feed-area -->
</div><!-- /home-shell -->

<script type="text/javascript">
  var BASE = 'https://beta.chronarchive.com/Chronarchive/Test-Footage/';
  var VIDEOS = [
    { src: BASE + 'newvideo.mov',   title: 'Introducing ChronoGraph', desc: 'An all-in-one browser, social media, entertainment, and utility service by Chronarchive.', date: '04-18-26' },
    { src: BASE + 'AppleWatch.mov', title: 'Video Title 1', desc: 'Video description', date: '04-18-26' },
    { src: BASE + 'Sadie.mov',      title: 'Video Title 2', desc: 'Video description', date: '04-18-26' },
    { src: BASE + 'SadieVToo.mov',  title: 'Video Title 3', desc: 'Video description', date: '04-18-26' }
  ];

  /* ── Dynamic posts via JSONP (no CORS needed) ── */
  var POSTS_URL = 'https://beta.chronarchive.com/Chronarchive/Applications/ChronoGraph/posts.js';
  var _postsTimer = null;

  function chronographPosts(posts) {
    if (_postsTimer) { clearTimeout(_postsTimer); _postsTimer = null; }
    renderPosts(posts);
  }

  (function() {
    _postsTimer = setTimeout(function() {
      _postsTimer = null;
      /* Script didn't call back in time — show fallback */
      showPostsError();
    }, 8000);
    var s = document.createElement('script');
    s.type = 'text/javascript';
    s.src  = POSTS_URL;
    s.onerror = function() {
      if (_postsTimer) { clearTimeout(_postsTimer); _postsTimer = null; }
      showPostsError();
    };
    document.head.appendChild(s);
  })();

  function renderPosts(posts) {
    var feed = document.getElementById('posts-feed');
    feed.innerHTML = '';
    if (!posts || posts.length === 0) {
      feed.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#888;font-size:14px;">No posts yet.</div>';
      return;
    }
    var HEART   = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    var COMMENT = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
    var SHARE   = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
    for (var i = 0; i < posts.length; i++) {
      var p = posts[i];
      var card = document.createElement('div');
      card.className = 'post-card';
      card.innerHTML =
        '<div class="post-header">' +
          '<div class="post-avatar"><img src="' + (p.avatar||'') + '" alt=""></div>' +
          '<div><div class="post-username">' + (p.username||'') + '</div><div class="post-location">' + (p.location||'') + '</div></div>' +
        '</div>' +
        (p.image ? '<div class="post-img-wrap"><img src="' + p.image + '" alt=""></div>' : '') +
        '<div class="post-actions">' +
          '<div class="like-wrap">' +
            '<button class="action-btn" onclick="toggleLike(this)">' + HEART + '</button>' +
            '<span class="like-count">0</span>' +
          '</div>' +
          '<button class="action-btn">' + COMMENT + '</button>' +
          '<button class="action-btn">' + SHARE   + '</button>' +
        '</div>' +
        '<div class="post-caption">' +
          '<div class="post-title">'  + (p.title||'') + '</div>' +
          '<div class="post-desc">'   + (p.desc||'')  + '</div>' +
          '<div class="post-date">'   + (p.date||'')  + '</div>' +
        '</div>';
      feed.appendChild(card);
    }
  }

  function showPostsError() {
    var feed = document.getElementById('posts-feed');
    feed.innerHTML =
      '<div style="text-align:center;padding:48px 20px;font-family:\'Helvetica Neue\',Helvetica,Arial,sans-serif;">' +
        '<div style="font-size:36px;margin-bottom:12px;">&#128235;</div>' +
        '<div style="color:#444;font-size:14px;font-weight:bold;">Posts aren\'t loading right now</div>' +
        '<div style="color:#888;font-size:12px;margin-top:6px;">Check your connection and try again</div>' +
      '</div>';
  }

  var currentFeed  = 'posts';
  var currentVid   = 0;
  var videosFeed   = document.getElementById('videos-feed');
  var postsFeed    = document.getElementById('posts-feed');


  /* ── Build video slides ── */
  var vidNavEl = document.createElement('div');
  vidNavEl.id = 'vid-nav';
  vidNavEl.innerHTML =
    '<button id="vid-prev" class="vnav-btn" onclick="goToVideo(currentVid-1)" disabled>&#9650;</button>' +
    '<button id="vid-next" class="vnav-btn" onclick="goToVideo(currentVid+1)">&#9660;</button>';
  videosFeed.appendChild(vidNavEl);

  for (var i = 0; i < VIDEOS.length; i++) {
    (function(idx) {
      var v = VIDEOS[idx];
      var slide = document.createElement('div');
      slide.className = 'video-slide';
      slide.id = 'vs-' + idx;
      if (idx > 0) slide.style.display = 'none';
      slide.innerHTML =
        '<video id="v-' + idx + '" webkit-playsinline playsinline loop preload="none"' +
        ' style="position:absolute;top:50%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);min-width:100%;min-height:100%;width:auto;height:auto;pointer-events:none;">' +
        '<source src="' + v.src + '" type="video/quicktime">' +
        '</video>' +
        '<div class="video-overlay">' +
          '<div class="video-title">' + v.title + '</div>' +
          '<div class="video-desc">' + v.desc + '</div>' +
          '<div class="video-date">' + v.date + '</div>' +
        '</div>' +
        '<div class="video-side">' +
          '<div class="video-action"><button class="vaction-btn" onclick="toggleVLike(this)">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
          '</button><div class="vaction-count">0</div></div>' +
          '<div class="video-action"><button class="vaction-btn">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '</button></div>' +
          '<div class="video-action"><button class="vaction-btn">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
          '</button></div>' +
        '</div>';
      videosFeed.appendChild(slide);

      /* Per-slide touch: swipe to navigate, tap to play/pause */
      var localStartY = 0;
      slide.addEventListener('touchstart', function(e) {
        localStartY = e.touches[0].clientY;
      }, false);
      slide.addEventListener('touchend', function(e) {
        var dy = localStartY - e.changedTouches[0].clientY;
        if (Math.abs(dy) > 40) {
          /* swipe gesture — navigate */
          if (dy > 0 && currentVid < VIDEOS.length - 1) goToVideo(currentVid + 1);
          else if (dy < 0 && currentVid > 0)            goToVideo(currentVid - 1);
        } else {
          /* tap — toggle play/pause, ignore action buttons */
          var t = e.target;
          while (t && t !== slide) {
            if (t.className && t.className.indexOf('vaction-btn') !== -1) return;
            t = t.parentNode;
          }
          var vid = document.getElementById('v-' + idx);
          if (vid) { if (vid.paused) vid.play(); else vid.pause(); }
        }
      }, false);
    })(i);
  }

  function updateVidNav() {
    var prev = document.getElementById('vid-prev');
    var next = document.getElementById('vid-next');
    if (prev) { if (currentVid === 0) prev.setAttribute('disabled',''); else prev.removeAttribute('disabled'); }
    if (next) { if (currentVid >= VIDEOS.length - 1) next.setAttribute('disabled',''); else next.removeAttribute('disabled'); }
  }

  function goToVideo(idx) {
    if (idx < 0 || idx >= VIDEOS.length) return;
    var old = document.getElementById('v-' + currentVid);
    if (old) old.pause();
    document.getElementById('vs-' + currentVid).style.display = 'none';
    currentVid = idx;
    document.getElementById('vs-' + currentVid).style.display = 'block';
    var nv = document.getElementById('v-' + currentVid);
    if (nv) { nv.load(); nv.play(); }
    updateVidNav();
  }

  /* ── Feed toggle ── */
  function switchFeed(which) {
    currentFeed = which;
    document.getElementById('btn-posts').className  = 'toggle-btn' + (which === 'posts'  ? ' active' : '');
    document.getElementById('btn-videos').className = 'toggle-btn' + (which === 'videos' ? ' active' : '');
    var ov = document.getElementById('v-' + currentVid);
    if (which === 'posts') {
      postsFeed.style.display  = 'block';
      videosFeed.style.display = 'none';
      if (ov) ov.pause();
    } else {
      postsFeed.style.display  = 'none';
      videosFeed.style.display = 'block';
      var nv2 = document.getElementById('v-' + currentVid);
      if (nv2) { nv2.load(); nv2.play(); }
      updateVidNav();
    }
  }

  /* ── Post like ── */
  function toggleLike(btn) {
    var svg   = btn.querySelector('svg');
    var count = btn.parentNode.querySelector('.like-count');
    var liked = btn.getAttribute('data-liked') === '1';
    if (liked) {
      svg.setAttribute('fill', 'none'); svg.removeAttribute('stroke');
      count.textContent = '0'; btn.setAttribute('data-liked', '0');
    } else {
      svg.setAttribute('fill', '#ff3b30'); svg.setAttribute('stroke', '#ff3b30');
      count.textContent = '1'; btn.setAttribute('data-liked', '1');
    }
  }

  /* ── Video like ── */
  function toggleVLike(btn) {
    var svg   = btn.querySelector('svg');
    var count = btn.parentNode.querySelector('.vaction-count');
    var liked = btn.getAttribute('data-liked') === '1';
    if (liked) {
      svg.setAttribute('fill', 'none'); svg.setAttribute('stroke', '#fff');
      count.textContent = '0'; btn.setAttribute('data-liked', '0');
    } else {
      svg.setAttribute('fill', '#ff3b30'); svg.setAttribute('stroke', '#ff3b30');
      count.textContent = '1'; btn.setAttribute('data-liked', '1');
    }
  }
</script>
</body>
</html>
